name: Sync Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check repository sync status
        run: |
          echo "Running Sync Check..."
          git fetch origin
          LOCAL=$(git rev-parse @)
          REMOTE=$(git rev-parse origin/main)

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "✅ Repository is in sync with GitHub."
          else
            echo "::warning::Repository may have drift from remote main"
            echo "Local:  $LOCAL"
            echo "Remote: $REMOTE"
          fi

      - name: Validate key Grok/project files
        run: |
          echo "Validating critical alignment files..."
          for f in docs/project-status.md GROK_HEALTH.md core/grok_client.py; do
            if [ -f "$f" ]; then
              echo "✅ $f present"
            else
              echo "::warning::Missing: $f"
            fi
          done

      - name: Summary
        if: always()
        run: echo "Sync check completed."