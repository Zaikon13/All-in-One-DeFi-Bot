name: Sync Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Full Sync Check
        run: |
          git fetch origin
          LOCAL=$(git rev-parse @)
          REMOTE=$(git rev-parse origin/main)
          UNCOMMITTED=$(git status --porcelain | wc -l)
          if [ "$LOCAL" = "$REMOTE" ] && [ $UNCOMMITTED -eq 0 ]; then
            echo "✅ Repository is FULLY in sync"
          else
            echo "::warning::Repository is OUT OF SYNC"
            exit 1
          fi

      - name: Summary
        run: echo "Sync check completed."
