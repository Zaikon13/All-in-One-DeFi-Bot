name: Sync Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Full Repository Sync Check
        id: sync
        run: |
          echo "🔍 Running Full Repo Sync Check..."
          git fetch origin
          
          # Check commit sync
          LOCAL=$(git rev-parse @)
          REMOTE=$(git rev-parse origin/main)
          
          # Check for uncommitted changes
          UNCOMMITTED=$(git status --porcelain | wc -l)
          
          if [ "$LOCAL" = "$REMOTE" ] && [ "$UNCOMMITTED" -eq 0 ]; then
            echo "status=synced" >> $GITHUB_OUTPUT
            echo "✅ Repository is FULLY in sync with GitHub (no uncommitted changes)."
          else
            echo "status=out_of_sync" >> $GITHUB_OUTPUT
            echo "::warning::Repository is OUT OF SYNC!"
            echo "Local: $LOCAL"
            echo "Remote: $REMOTE"
            echo "Uncommitted files: $UNCOMMITTED"
            
            # Generate diff for awareness
            git diff origin/main > sync-diff.txt || true
            echo "diff_file=sync-diff.txt" >> $GITHUB_OUTPUT
          fi

      - name: Grok Sync Analysis (Awareness)
        if: steps.sync.outputs.status == 'out_of_sync'
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          if [ -f sync-diff.txt ]; then
            DIFF=$(head -c 4000 sync-diff.txt)
            
            RESPONSE=$(curl -s -X POST "https://api.x.ai/v1/chat/completions" \
              -H "Authorization: Bearer $GROK_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{
                "model": "grok-4.3",
                "messages": [
                  {"role": "system", "content": "You are a senior DevOps engineer for the All-in-One-DeFi-Bot. Analyze the git diff and provide a concise summary of changes, potential risks, and recommended actions for sync. Be specific to DeFi bot maintenance."},
                  {"role": "user", "content": "Analyze this sync diff and recommend actions:\n$DIFF"}
                ],
                "max_tokens": 500
              }')
            
            ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Grok analysis failed"')
            echo "analysis<<EOF" >> $GITHUB_OUTPUT
            echo "$ANALYSIS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Awareness Issue if Out of Sync
        if: steps.sync.outputs.status == 'out_of_sync'
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = `${{ steps.grok.outputs.analysis || 'Manual review required' }}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Repo Sync Alert - Action Required',
              body: `## Repository Sync Issue Detected

**Time:** ${new Date().toISOString()}

**Status:** Out of sync with remote main branch.

**Grok Analysis:**
${analysis}

**Next Steps:**
1. Review local changes
2. Run 'git status' and 'git diff origin/main'
3. Commit or stash changes
4. Push to main

*This issue was auto-generated by sync-check.yml for awareness.*
`});

      - name: Summary
        if: always()
        run: echo "Sync check completed with full awareness."