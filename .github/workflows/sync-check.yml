name: Sync Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Full Sync Check
        id: sync
        run: |
          git fetch origin
          LOCAL=$(git rev-parse @)
          REMOTE=$(git rev-parse origin/main)
          UNCOMMITTED=$(git status --porcelain | wc -l)
          if [ "$LOCAL" = "$REMOTE" ] && [ $UNCOMMITTED -eq 0 ]; then
            echo "status=synced" >> $GITHUB_OUTPUT
          else
            echo "status=out_of_sync" >> $GITHUB_OUTPUT
            git diff origin/main > /tmp/diff.txt || true
          fi

      - name: Grok Analysis (Awareness)
        id: grok
        if: steps.sync.outputs.status == 'out_of_sync'
        continue-on-error: true
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          DIFF=$(head -c 3000 /tmp/diff.txt 2>/dev/null || echo "no diff")
          RESPONSE=$(curl -s -X POST https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"grok-4.3\",\"messages\":[{\"role\":\"system\",\"content\":\"DeFi bot DevOps. Summarize sync diff briefly and suggest action.\"},{\"role\":\"user\",\"content\":\"Analyze this diff and give clear recommendations:\\n$DIFF\"}],\"max_tokens\":350}" || echo '{"choices":[{"message":{"content":"Grok call failed - check API key or rate limit"}}]}')
          ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Grok unavailable"' | head -c 1200)
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Awareness Issue
        if: steps.sync.outputs.status == 'out_of_sync'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const a = `${{ steps.grok.outputs.analysis || 'Manual review needed' }}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Repo Sync Alert - Full Awareness',
              body: `## Full Repo Sync Issue Detected\n\n**Grok Analysis:**\n${a}\n\n**Next Steps:** Review local changes, commit, and push.`
            }).catch(() => {});

      - name: Summary
        run: echo "Full Repo Sync & Awareness check completed."
