name: Grok Code Review

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '.github/workflows/**'
      - 'prompts/**'
      - 'core/**'
      - 'app/**'
      - 'worker.py'
      - 'requirements*.txt'
      - 'railway.toml'
      - 'docs/**'
    # Review Agent 2026-06: Approved with Conditions (High Risk) - added explicit branches: [main] + paths filter per Review decision.
    # This makes Grok Code Review run automatically on relevant PRs to main while reducing noise/cost on irrelevant changes.
    # Remains advisory only (continue-on-error: true). Does not replace the internal Review Agent mandatory gate.
    # No push: triggers added; kept PR-focused as required.

permissions:
  contents: read
  pull-requests: write

jobs:
  grok-code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Get PR diff
        run: git diff origin/main...HEAD > pr.diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Call Grok for Review
        id: grok
        if: hashFiles('pr.diff') != ''
        continue-on-error: true
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          DIFF=$(head -c 6000 pr.diff || true)
          REVIEW=$(PYTHONPATH=. python .github/scripts/call_grok.py grok_code_review.txt --var "diff=$DIFF" --timeout 60 2>&1 | head -c 1200 || echo "Grok review failed")
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Grok Review on PR
        if: steps.grok.outputs.review != ''
        uses: actions/github-script@v7
        env:
          # Pass via env (not ${{ }} interpolation) so the model output cannot break
          # out of the JS string or inject script. Fixes SyntaxError on odd diffs.
          REVIEW: ${{ steps.grok.outputs.review }}
        with:
          script: |
            const review = process.env.REVIEW || "_Review unavailable this run._";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Grok Code Review\n\n${review}`
            });
