name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  grok-code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Get PR diff
        run: git diff origin/main...HEAD > pr.diff

      - name: Call Grok for Review
        id: grok
        if: hashFiles('pr.diff') != ''
        continue-on-error: true
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          DIFF=$(head -c 6000 pr.diff)
          JSON=$(jq -n --arg diff "$DIFF" '{
            model: "grok-4.3",
            messages: [
              {role: "system", content: "You are a senior software engineer doing code review for a DeFi Telegram bot. Focus on bugs, security, performance, code quality, and best practices. Be constructive and concise."},
              {role: "user", content: ("Please review these code changes:\n\n```diff\n" + $diff + "\n```")}
            ],
            max_tokens: 1200,
            temperature: 0.2
          }')
          RESPONSE=$(curl -s -X POST https://api.x.ai/v1/chat/completions \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON" || echo '{"choices":[{"message":{"content":"Grok review failed"}}]}')
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Grok unavailable"')
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Grok Review on PR
        if: steps.grok.outputs.review != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Grok Code Review\n\n${{ steps.grok.outputs.review }}`
            });
