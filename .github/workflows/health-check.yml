name: Health Check Report

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Railway Health Endpoint
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bot-production-3d9c.up.railway.app/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Generate Health Report
        id: report
        run: |
          REPORT="## All-in-One DeFi Bot - Health Check Report\n\n"
          REPORT+="**Time:** $(date '+%Y-%m-%d %H:%M UTC')\n\n"

          if [ "${{ steps.health.outputs.status }}" = "200" ]; then
            REPORT+="✅ Healthy\n"
          else
            REPORT+="⚠️ Unhealthy (HTTP ${{ steps.health.outputs.status }})\n"
          fi

          REPORT+="\n**Checked:** Railway Web + Health Endpoint\n"
          REPORT+="**Repo:** Zaikon13/All-in-One-DeFi-Bot\n"

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Grok Health Analysis
        id: grok
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          if [ -z "$GROK_API_KEY" ]; then
            echo "analysis=GROK_API_KEY not configured" >> $GITHUB_OUTPUT
            exit 0
          fi

          STATUS="${{ steps.health.outputs.status }}"
          BASIC_REPORT="${{ steps.report.outputs.report }}"

          RESPONSE=$(curl -s https://api.x.ai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -d @- << JSON
{
  "model": "grok-4.3",
  "messages": [{
    "role": "user",
    "content": "You are the AI coordinator for All-in-One DeFi Bot. Health status code: $STATUS. Basic report: $BASIC_REPORT. Give a short professional summary (2-3 sentences) and one concrete actionable recommendation if the service looks unhealthy."
  }],
  "max_tokens": 350,
  "temperature": 0.3
}
JSON
)

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Grok analysis unavailable"' | head -c 800)
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Print Report
        run: |
          echo "${{ steps.report.outputs.report }}"
          echo ""
          echo "--- Grok Analysis ---"
          echo "${{ steps.grok.outputs.analysis }}"

      - name: Send Report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.HEALTH_CHECK_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            FULL_TEXT="${{ steps.report.outputs.report }}\n\n--- Grok Analysis ---\n${{ steps.grok.outputs.analysis }}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="$FULL_TEXT" \
              -d parse_mode="Markdown" || true
          else
            echo "Telegram notification skipped (secrets not set)"
          fi