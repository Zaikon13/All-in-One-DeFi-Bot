name: Health Check Report

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Railway Health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%s" https://bot-production-3d9c.up.railway.app/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Grok Analysis
        id: grok
        if: steps.health.outputs.status != '200'
        continue-on-error: true
        env: { GROK_API_KEY: ${{ secrets.GROK_API_KEY }} }
        run: |
          RESPONSE=$(curl -s -X POST https://api.x.ai/v1/chat/completions -H "Authorization: Bearer $GROK_API_KEY" -H "Content-Type: application/json" -d '{"model":"grok-4.3","messages":[{"role":"system","content":"DeFi bot DevOps. Analyze Railway failure."},{"role":"user","content":"HTTP status: ${{ steps.health.outputs.status }} - suggest fixes."}],"max_tokens":400}' || echo '{"choices":[{"message":{"content":"Grok failed"}}]}')
          ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Grok unavailable"' | head -c 1200)
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Issue
        if: steps.health.outputs.status != '200'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const a = `${{ steps.grok.outputs.analysis || 'Check logs' }}`;
            github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: 'Health Alert', body: a }).catch(()=>{});

      - name: Report
        id: report
        run: |
          R="## Health Check\n**Status:** ${{ steps.health.outputs.status == '200' && '✅ Healthy' || '❌ Unhealthy' }}"
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$R" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Print
        run: echo "${{ steps.report.outputs.report }}"

      - name: Telegram
        env: { TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}, CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} }
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="$CHAT_ID" -d text="${{ steps.report.outputs.report }}" -d parse_mode=Markdown || true
          fi
