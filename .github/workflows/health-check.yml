name: Health Check Report

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Railway Health Endpoint
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bot-production-3d9c.up.railway.app/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Generate Health Report
        id: report
        run: |
          REPORT="## 🏥 All-in-One DeFi Bot - Health Check Report\n\n"
          REPORT+="**Time:** $(date '+%Y-%m-%d %H:%M UTC')\n\n"
          if [ "${{ steps.health.outputs.status }}" = "200" ]; then
            REPORT+="✅ **Railway:** Healthy\n"
          else
            REPORT+="❌ **Railway:** Unhealthy (HTTP ${{ steps.health.outputs.status }})\n"
          fi
          REPORT+="\n**Repo:** Zaikon13/All-in-One-DeFi-Bot\n"
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Grok Health Analysis
        id: grok
        if: steps.health.outputs.status != '200'
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          RESPONSE=$(curl -s -X POST "https://api.x.ai/v1/chat/completions" \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"grok-4.3","messages":[{"role":"system","content":"Senior DeFi bot DevOps. Analyze Railway health failure and give root cause + fixes."},{"role":"user","content":"HTTP status: ${{ steps.health.outputs.status }}. Analyze and recommend fixes."}],"max_tokens":500}')
          ANALYSIS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Grok analysis failed"' | head -c 1800)
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Issue if Unhealthy
        if: steps.health.outputs.status != '200'
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = `${{ steps.grok.outputs.analysis || 'Check Railway logs' }}`;
            github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: '🚨 Bot Health Alert',
              body: `## Health Failure

**Status:** HTTP ${{ steps.health.outputs.status }}

**Grok Analysis:**
${analysis}

**Action:** Check Railway logs for bot-production-3d9c and redeploy if needed.
`});

      - name: Print Report
        run: echo "${{ steps.report.outputs.report }}"

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.HEALTH_CHECK_CHAT_ID || secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d chat_id="$CHAT_ID" -d text="${{ steps.report.outputs.report }}" -d parse_mode="Markdown" || true
          fi
