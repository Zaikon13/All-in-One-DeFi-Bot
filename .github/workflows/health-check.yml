name: Health Check Report

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Railway Health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bot-production-3d9c.up.railway.app/health || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv

      - name: Grok Analysis (Awareness)
        id: grok
        if: steps.health.outputs.status != '200'
        continue-on-error: true
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          ANALYSIS=$(PYTHONPATH=. python .github/scripts/call_grok.py grok_health_check.txt --var "status=${{ steps.health.outputs.status }}" --timeout 30 2>&1 | head -c 1200 || echo "Grok call failed")
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Awareness Issue
        if: steps.health.outputs.status != '200'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const a = `${{ steps.grok.outputs.analysis || 'Check Railway logs' }}`;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Health Alert - Railway Unhealthy',
              body: `## Health Check Failure\n\n**Grok Analysis:**\n${a}\n\n**Immediate Actions:** Check Railway dashboard for bot-production-3d9c`
            }).catch(() => {});

      - name: Report
        id: report
        run: |
          R="## Health Check\n**Status:** ${{ steps.health.outputs.status == '200' && '✅ Healthy' || '❌ Unhealthy' }}"
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$R" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Print
        run: echo "${{ steps.report.outputs.report }}"

      - name: Telegram (optional)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="${{ steps.report.outputs.report }}" \
              -d parse_mode="Markdown" || true
          fi
