name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff || true

      - name: Review with Grok
        id: review
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          if [ ! -s pr.diff ]; then
            echo 'output<<EOF' >> $GITHUB_OUTPUT
            echo 'No significant changes to review.' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
            exit 0
          fi

          DIFF=$(head -200 pr.diff)

          JSON=$(jq -n \
            --arg model "grok-4.3" \
            --arg system "You are a senior software engineer performing code review. Focus on: bugs, security issues, performance problems, code smells, and best practices. Be constructive and specific. Keep feedback concise." \
            --arg user "Please review the following code changes:\n\n```diff\n$DIFF\n```" \
            '{model: $model, messages: [{role:"system", content:$system}, {role:"user", content:$user}], temperature: 0.2, max_tokens: 800}')

          RESP=$(curl -s https://api.x.ai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -d "$JSON")

          REVIEW=$(echo "$RESP" | jq -r '.choices[0].message.content // "No review generated"')

          echo 'output<<EOF' >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: actions/github-script@v7
        if: steps.review.outputs.output != ''
        with:
          script: |
            const review = `${{ steps.review.outputs.output }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Grok Code Review

${review}`
            });