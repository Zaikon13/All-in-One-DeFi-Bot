name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/main...HEAD > pr.diff
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          cat pr.diff >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Grok for Review
        id: grok
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          DIFF=$(cat pr.diff | head -300)
          RESPONSE=$(curl -s https://api.x.ai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -d '{
              "model": "grok-2-latest",
              "messages": [
                {"role": "system", "content": "You are an expert senior developer. Review the following code changes and provide constructive feedback. Be concise but useful. Focus on bugs, security, performance, and best practices."},
                {"role": "user", "content": "Here are the code changes:\n\n```diff\n'"$DIFF"'\n```"}
              ],
              "temperature": 0.3
            }')
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" | jq -r '.choices[0].message.content' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.grok.outputs.review }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Grok Code Review\n\n${review}`
            });