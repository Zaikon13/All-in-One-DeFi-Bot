name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  grok-code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/main...HEAD > pr.diff || true

      - name: Call Grok for Review
        id: grok
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          if [ ! -s pr.diff ]; then
            echo 'review<<EOF' >> $GITHUB_OUTPUT
            echo 'No significant code changes to review.' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
            exit 0
          fi

          DIFF=$(head -c 6000 pr.diff)

          RESPONSE=$(curl -s https://api.x.ai/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROK_API_KEY" \
            -d @- << JSON
{
  "model": "grok-4.3",
  "messages": [
    {
      "role": "system",
      "content": "You are a senior software engineer doing code review for a DeFi Telegram bot. Focus on bugs, security, performance, code quality, and best practices. Be constructive and concise."
    },
    {
      "role": "user",
      "content": "Please review these code changes:\n\n```diff\n$DIFF\n```"
    }
  ],
  "max_tokens": 1200,
  "temperature": 0.2
}
JSON
)

          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Grok could not generate a review."')

          echo 'review<<EOF' >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Post Grok Review on PR
        uses: actions/github-script@v7
        if: steps.grok.outputs.review != ''
        with:
          script: |
            const review = `${{ steps.grok.outputs.review }}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Grok Code Review

${review}`
            });