name: Dependency Update Check

on:
  schedule:
    - cron: '0 8 * * 0'   # Every Sunday at 08:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run security audit (pip-audit)
        id: audit
        run: |
          echo "🛡️ Running security audit..."
          pip-audit --format json > audit.json 2>/dev/null || true
          
          if grep -q '"vulns": \[\]' audit.json; then
            echo "no_vulns=true" >> $GITHUB_OUTPUT
          else
            echo "no_vulns=false" >> $GITHUB_OUTPUT
            echo "⚠️ Vulnerabilities found!"
            cat audit.json
          fi

      - name: Create GitHub Issue if security issues found
        if: steps.audit.outputs.no_vulns == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let body = `## 📦 Dependency Security Check Report\n\n`;
            body += `**Date:** ${new Date().toISOString()}\n\n`;
            
            if (fs.existsSync('audit.json')) {
              body += `### Security Audit\n\`\`\`json\n${fs.readFileSync('audit.json', 'utf8')}\n\`\`\`\n\n`;
            }
            
            body += `**Action Required:** Please review and update the dependencies (Dependabot handles routine updates via PRs).\n`;
            body += `**Labels:** dependencies, maintenance, security`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📦 Security Issues Detected in Dependencies',
              body: body,
              labels: ['dependencies', 'maintenance', 'security', 'automated']
            });

      - name: Summary
        run: |
          echo "✅ Dependency check completed."
          echo "Outdated packages: ${{ steps.outdated.outputs.has_outdated }}"
          echo "Security issues: ${{ steps.audit.outputs.no_vulns == 'false' && 'Yes' || 'No' }}"