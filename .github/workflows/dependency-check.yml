name: Dependency Update Check

on:
  schedule:
    - cron: '0 8 * * 0'   # Every Sunday at 08:00 UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: Check for outdated packages
        id: outdated
        run: |
          echo "🔍 Checking for outdated packages..."
          pip list --outdated --format=columns > outdated.txt || true
          
          if [ -s outdated.txt ]; then
            echo "has_outdated=true" >> $GITHUB_OUTPUT
            echo "📦 Outdated packages found!"
            cat outdated.txt
          else
            echo "has_outdated=false" >> $GITHUB_OUTPUT
            echo "✅ All packages are up to date."
          fi

      - name: Run security audit (pip-audit)
        id: audit
        run: |
          echo "🛡️ Running security audit..."
          pip-audit --format json > audit.json 2>/dev/null || true
          
          if grep -q '"vulns": \[\]' audit.json; then
            echo "no_vulns=true" >> $GITHUB_OUTPUT
          else
            echo "no_vulns=false" >> $GITHUB_OUTPUT
            echo "⚠️ Vulnerabilities found!"
            cat audit.json
          fi

      - name: Create GitHub Issue if problems found
        if: steps.outdated.outputs.has_outdated == 'true' || steps.audit.outputs.no_vulns == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let body = `## 📦 Dependency Check Report\n\n`;
            body += `**Date:** ${new Date().toISOString()}\n\n`;
            
            if (fs.existsSync('outdated.txt')) {
              body += `### Outdated Packages\n\`\`\`\n${fs.readFileSync('outdated.txt', 'utf8')}\n\`\`\`\n\n`;
            }
            
            if (fs.existsSync('audit.json')) {
              body += `### Security Audit\n\`\`\`json\n${fs.readFileSync('audit.json', 'utf8')}\n\`\`\`\n\n`;
            }
            
            body += `**Action Required:** Please review and update the dependencies.\n`;
            body += `**Labels:** dependencies, maintenance`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📦 Outdated Dependencies or Security Issues Detected',
              body: body,
              labels: ['dependencies', 'maintenance', 'automated']
            });

      - name: Summary
        run: |
          echo "✅ Dependency check completed."
          echo "Outdated packages: ${{ steps.outdated.outputs.has_outdated }}"
          echo "Security issues: ${{ steps.audit.outputs.no_vulns == 'false' && 'Yes' || 'No' }}"